version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fleetiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/fleetiq
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-prod
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/fleetiq
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-prod
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

volumes:
  pgdata:
